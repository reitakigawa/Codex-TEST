{% extends "base.html" %}

{% block title %}novels | Personal Site{% endblock %}

{% block content %}
<h2>小説一覧</h2>

{% if novels %}
<ul>
  {% for novel in novels %}
  <li>
    <a href="/novels/{{ novel.slug }}">{{ novel.title }}</a>
    {% if novel.date %}
    <small>({{ novel.date }})</small>
    {% endif %}
  </li>
  {% endfor %}
</ul>
{% else %}
<p>まだ小説はありません。</p>
{% endif %}
{% endblock %}
