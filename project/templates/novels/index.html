<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>novels | Personal Site</title>
  </head>
  <body>
    <h1>novels</h1>
    <p><a href="/">トップへ戻る</a></p>

    <h2>小説一覧</h2>
    {% if novels %}
    <ul>
      {% for novel in novels %}
      <li>
        <a href="/novels/{{ novel.slug }}">{{ novel.title }}</a>
        {% if novel.date %}
        <small>({{ novel.date }})</small>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p>まだ小説はありません。</p>
    {% endif %}
  </body>
</html>
